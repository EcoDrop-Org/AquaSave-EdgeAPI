services:
  edge-service:
    build: .
    container_name: aquasave-edge-service
    environment:
      - MQTT_BROKER_URL=mqtts://109a1a97e0814454afa8d22b818e2da5.s1.eu.hivemq.cloud:8883
      - MQTT_USERNAME=${MQTT_USERNAME:-aquasave-edge}
      - MQTT_PASSWORD=${MQTT_PASSWORD:?set MQTT_PASSWORD in .env}
      - MQTT_CLIENT_ID=${MQTT_CLIENT_ID:-aquasave-edge-service}
      - BACKEND_BASE_URL=https://aquasave-backend.onrender.com
      - EDGE_API_KEY=${EDGE_API_KEY:-}
      - COMMAND_POLL_INTERVAL_MS=3000
    restart: unless-stopped
